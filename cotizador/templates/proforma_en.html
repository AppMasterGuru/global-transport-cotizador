<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Abel's real proforma format — matched from Farmex/2605-018 (LCL) and 2605-034 (FCL) ── */
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 8.5pt; color: #222; background: #fff; }

    /* Full-width header / footer images */
    .page-img { width: 100%; display: block; }

    /* Content padding */
    .content { padding: 5mm 10mm 4mm 10mm; }

    /* Document title — orange, bold, left-aligned (matches "LCL CFR EXPO" / "CFR EXPO" label) */
    .doc-title {
      color: #E8471C;
      font-size: 10pt;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    /* ── Info / route tables ── */
    table.tbl-info {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
      font-size: 8pt;
    }
    table.tbl-info th {
      border: 1px solid #aaa;
      padding: 3px 8px;
      font-weight: bold;
      text-align: center;
      background: #fff;
    }
    table.tbl-info td {
      border: 1px solid #aaa;
      padding: 3px 8px;
    }
    table.tbl-info td.lbl { font-weight: bold; }
    table.tbl-info td.val { text-align: center; }

    /* ── Pricing section tables ── */
    table.tbl-sec {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
      font-size: 8pt;
    }
    /* Section header row — orange bar spanning all columns */
    table.tbl-sec tr.row-sec-hdr td {
      background: #E8471C;
      color: #fff;
      font-weight: bold;
      padding: 4px 8px;
      font-size: 8.5pt;
    }
    /* Column header row — navy */
    table.tbl-sec tr.row-col-hdr td {
      background: #1B3A6B;
      color: #fff;
      font-weight: bold;
      padding: 3px 8px;
      font-size: 7.5pt;
      text-align: center;
      border-top: 1px solid #fff;
    }
    table.tbl-sec tr.row-col-hdr td.left { text-align: left; }
    /* Data rows */
    table.tbl-sec tbody td {
      padding: 3px 8px;
      border: 1px solid #ddd;
    }
    table.tbl-sec tbody td.r { text-align: right; }
    table.tbl-sec tbody td.c { text-align: center; }
    /* Total row — only last two cells (TOTAL label + USD) are orange */
    table.tbl-sec tr.row-total td {
      padding: 4px 8px;
      border: 1px solid #ddd;
    }
    table.tbl-sec tr.row-total td.total-lbl,
    table.tbl-sec tr.row-total td.total-val {
      background: #E8471C;
      color: #fff;
      font-weight: bold;
      text-align: right;
      border: 1px solid #c83010;
    }

    /* ── Notes section ── */
    .notes {
      margin-top: 6px;
      font-size: 7.5pt;
      color: #333;
    }
    .notes .ntitle {
      text-decoration: underline;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .notes p { margin-bottom: 3px; }

    /* Footer push — keeps footer near bottom on short pages */
    .footer-push { margin-top: 6mm; }
  </style>
</head>
<body>

<!-- HEADER IMAGE: GT logo ("Our 23 years" for LCL / "DRIVEN BY TRUST" for FCL) + BASC/IATA/WCA certs -->
<img class="page-img" src="{{HEADER_IMG_SRC}}" alt="Global Transport SAC">

<div class="content">

  <!-- Document type title: "LCL CFR EXPO" / "CFR EXPO" / "AÉREO CFR EXPO" -->
  <p class="doc-title">{{DOC_TITLE}}</p>

  <!-- Cargo/container section (container table for FCL, weight/vol for LCL/Aéreo) -->
  {{CARGO_TABLE}}

  <!-- Route info table (COLOADER/PORT OF DEPARTURE/SCHEDULE/Validity for LCL etc.) -->
  {{ROUTE_TABLE}}

  <!-- International freight section (Ocean Freight / International Freight) -->
  {{FLETE_TABLE}}

  <!-- Local charges section (Local Charges) -->
  {{LOCAL_TABLE}}

  <!-- Notes -->
  {{NOTES_SECTION}}

</div>

<div class="footer-push"></div>

<!-- FOOTER IMAGE: "We are at your Service 24/7" (LCL) / navy address bar (FCL) -->
<img class="page-img" src="{{FOOTER_IMG_SRC}}" alt="">

</body>
</html>
